<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Navigator | Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Pirata+One&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ocean-bg"></div>
    <header>
        <div class="logo-area"><img src="images/logo.png" alt="Logo" class="floating"></div>
        <div class="user-profile">
            <div class="avatar-ring active-ring"><img src="images/user-solid-full.svg" alt="User"></div>
        </div>
    </header>

    <div id="main-wrapper">
        <nav class="glass-sidebar">
            <h2 class="menu-title">SISTEMA</h2>
            <ul class="nav-links">
                <li><a href="index.html"><span>⚓</span> Home</a></li>
                <li><a href="perfil.html" class="active"><span>👤</span> Meu Perfil</a></li>
                <li><a href="comunidade.html"><span>💬</span> Comunidade</a></li>
            </ul>
        </nav>

        <main class="hero-content">
            <h2 class="page-title">REGISTRO DO PIRATA</h2>

            <section class="profile-layout">
                <article class="wanted-card">
                    <div class="wanted-header">WANTED</div>
                    <div class="profile-pic-container">
                        <img src="images/fotos-perfil/eu.jpeg" alt="Avatar do Capitão">
                    </div>
                    <div class="wanted-info">
                        <h3 class="pirate-name">CAPITÃO CAIO</h3>
                        <p class="bounty-label">DEAD OR ALIVE</p>
                        <p class="bounty-value">฿ 1.500.000.000</p>
                    </div>
                    <div class="crew-tag">Bando: CHAPÉUS DE PALHA </div>
                </article>

                <article class="logbook-card">
                    <div class="card-inner">
                        <h3>DIÁRIO DE BORDO</h3>
                        <form class="system-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Akuma no Mi Favorita</label>
                                    <input type="text" value="Goro Goro no Mi">
                                </div>
                                <div class="form-group">
                                    <label>Arco do Coração</label>
                                    <input type="text" value="Guerra dos Maiorais">
                                </div>
                                <div class="form-group">
                                    <label>Vilão que eu Amaria Ser</label>
                                    <input type="text" value="Donquixote Doflamingo">
                                </div>
                                <div class="form-group">
                                    <label>Por que comecei a ver?</label>
                                    <textarea>Vi um edit do Zoro no TikTok e minha vida nunca mais foi a mesma...</textarea>
                                </div>
                                <div class="form-group">
                                    <label>Habilidade de Combate</label>
                                    <select>
                                        <option>Haki do Armamento</option>
                                        <option>Haki da Observação</option>
                                        <option selected>Haki do Rei </option>
                                        <option>Mestre em Deboche</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn-pirate mt-20">ATUALIZAR REGISTRO</button>
                        </form>
                    </div>
                </article>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
